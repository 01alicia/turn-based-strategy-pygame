site_name: Turn-Based Strategy Game
site_description: Documentation for a Python turn-based strategy game built with Pygame

theme:
  name: material
  language: en
#  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Documentation:
      - Overview: api/index.md
      - Controller:
          - Animation Manager: api/controller/animation_manager.md
          - Menu Handler: api/controller/menu_handler.md
          - Player Handler: api/controller/player_handler.md
      - Model:
          - Attack: api/model/attack.md
          - Competence: api/model/competence.md
          - Defense: api/model/defense.md
          - Hero Factory: api/model/hero_factory.md
          - Player: api/model/player.md
          - Unit: api/model/unit.md
      - View:
          - Animation: api/view/animation.md
          - Animation Factory: api/view/animation_factory.md
          - Effect: api/view/effect.md
          - Map: api/view/map.md
          - Menu: api/view/menu.md
          - Screen: api/view/screen.md
          - Sprite Config: api/view/sprites_config.md